<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
    <form>
        <div class="border border-secondary mx-3 my-3">
            <div class="border-bottom border-secondary bg-light py-3 ps-3">
                <h2>Payment form example</h2>
            </div>
            <div class="alert alert-danger mt-3 mx-3 rounded-3" role="alert">
                Some fields are missing
            </div>

            <div class="row">
                <div class="col-5">
                    <label for="Card">Card #</label>
                    <input type="password" name="name" id="Card" placeholder="XXXXXXXXXXX">
                </div>
                <div class="col-3">
                    <label for="CVC">CVC</label>
                    <input type="password" name="name" id="CVC" placeholder="0000">
                </div>
                <div class="col-3">
                    <label for="Amount">Amount</label>
                    <input type="number" name="name" id="Amount" placeholder="Amount">
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label for="First">First Name</label>
                    <input type="text" name="name" id="First">
                </div>
                <div class="col-6">
                    <label for="Last">Last Name</label>
                    <input type="text" name="name" id="Last">
                </div>
            </div>

            <div class="row">
                <div class="col-4">
                    <label for="City">City</label>
                    <input type="text" name="name" id="City">
                </div>
                <div class="col-4">
                    <label for="State">State</label>
                    <input type="text" name="name" id="State" placeholder="Pick a state">
                </div>
                <div class="col-4">
                    <label for="Postal">Postal Code</label>
                    <input type="text" name="name" id="Postal">
                </div>
            </div>

            <div class="row">
                <div class="col-6">
                    <label for="Master Card">We accept:</label>
                    <input type="radio" name="envio" id="Master Card">
                    <input type="radio" name="envio" id="Visa">
                    <input type="radio" name="envio" id="radio">
                    <input type="radio" name="envio" id="American Express">
                </div>
                <div class="col-6">
                    <input type="text">
                </div>
            </div>
           
            <div class="border-top border-secondary bg-light d-flex justify-content-end py-3">
                <input type="reset" value="Cancel" class="btn btn-secondary me-1">
                <input type="submit" value="Submit" class="btn btn-primary me-3">
            </div>
        </div>
    </form>
</body>

</html>
